name: Deploy Amigo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-amigo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      APP_DOMAIN: amigo.muxistudio.com
      APP_PORT: "10013"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace
        run: bun run build

      - name: Validate deployment secrets
        shell: bash
        run: |
          required_vars=(
            SERVER_HOST
            SERVER_USER
            SERVER_PASSWORD
          )

          for name in "${required_vars[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions config: $name"
              exit 1
            fi
          done

      - name: Ensure remote app directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          script: |
            mkdir -p ~/amigo

      - name: Upload application files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          target: "~/amigo"
          source: "package.json,bun.lock,pnpm-workspace.yaml,packages/server/package.json,packages/server/dist,packages/server/knowledge-base,packages/frontend/package.json,packages/frontend/dist,packages/types/package.json,packages/types/dist"

      - name: Restart server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          script: |
            set -e

            export PATH="$HOME/.bun/bin:$PATH"
            APP_DIR="$HOME/amigo"
            APP_DOMAIN="${{ env.APP_DOMAIN }}"
            APP_PORT="${{ env.APP_PORT }}"

            command -v bun >/dev/null 2>&1 || curl -fsSL https://bun.sh/install | bash
            export PATH="$HOME/.bun/bin:$PATH"

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            cd "$APP_DIR"
            bun install --production --frozen-lockfile

            if [ ! -f "$APP_DIR/packages/server/.env" ]; then
              echo "Missing $APP_DIR/packages/server/.env. Create it on the server before deploying."
              exit 1
            fi

            export AMIGO_SYSTEM_PROMPT_DIR="$APP_DIR/packages/server/dist/systemPrompt"

            cd "$APP_DIR/packages/server"
            pm2 delete amigo-server >/dev/null 2>&1 || true
            pm2 start "bun dist/index.js" --name amigo-server --update-env

            CADDY_DIR="$HOME/caddy"
            mkdir -p "$CADDY_DIR"

            cat > "$CADDY_DIR/Caddyfile" <<EOF
            $APP_DOMAIN {
                encode zstd gzip
                root * /srv/amigo

                @websocket {
                    header Connection *Upgrade*
                    header Upgrade websocket
                }
                reverse_proxy @websocket 127.0.0.1:$APP_PORT

                handle /api/* {
                    reverse_proxy 127.0.0.1:$APP_PORT
                }

                try_files {path} /index.html
                file_server
            }
            EOF

            cat > "$CADDY_DIR/docker-compose.yaml" <<EOF
            version: '3.8'

            services:
              caddy:
                image: caddy:latest
                network_mode: host
                volumes:
                  - ./Caddyfile:/etc/caddy/Caddyfile
                  - ./caddy_data:/data
                  - ./caddy_config:/config
                  - ../amigo/packages/frontend/dist:/srv/amigo:ro
            EOF

            (cd "$CADDY_DIR" && (docker compose up -d || docker-compose up -d))
            docker exec caddy-caddy-1 caddy reload --config /etc/caddy/Caddyfile || true

            pm2 save || true
            echo "Deployment completed."
