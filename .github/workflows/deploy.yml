name: Deploy Amigo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-amigo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build workspace
        run: bun run build

      - name: Validate deployment secrets
        shell: bash
        run: |
          required_vars=(
            SERVER_HOST
            SERVER_USER
            SERVER_PASSWORD
          )

          for name in "${required_vars[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub Actions config: $name"
              exit 1
            fi
          done

      - name: Ensure remote app directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          script: |
            mkdir -p ~/amigo

      - name: Upload application files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          target: "~/amigo"
          source: "package.json,bun.lock,pnpm-workspace.yaml,packages/server/package.json,packages/server/tsconfig.json,packages/server/src/**,packages/server/knowledge-base/**,packages/frontend/package.json,packages/frontend/dist/**,packages/types/package.json,packages/types/dist/**"

      - name: Restart server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          script: |
            set -e

            export PATH="$HOME/.bun/bin:$PATH"
            APP_DIR="$HOME/amigo"

            command -v bun >/dev/null 2>&1 || curl -fsSL https://bun.sh/install | bash
            export PATH="$HOME/.bun/bin:$PATH"

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            cd "$APP_DIR"
            bun install --production --frozen-lockfile

            if [ ! -f "$APP_DIR/packages/server/.env" ]; then
              echo "Missing $APP_DIR/packages/server/.env. Create it on the server before deploying."
              exit 1
            fi

            cd "$APP_DIR/packages/server"
            pm2 describe amigo-server >/dev/null 2>&1 \
              && pm2 restart amigo-server --update-env \
              || pm2 start "bun run src/index.ts" --name amigo-server

            pm2 save || true
            echo "Deployment completed."
